workflows:

  # ─── ANDROID: Google Play ───────────────────────────────────────────
  android-release:
    name: Android Release (Google Play)
    max_build_duration: 60
    environment:
      node: 22.0.0
      java: 17
      android_signing:
        - invoicepro_keystore
      vars:
        PACKAGE_NAME: com.asproite.invoicepro
        VITE_API_URL: https://invoicepro-production-2ed7.up.railway.app/api
        VITE_SUPABASE_URL: https://bzmyhlkwssyhxkqrjmwj.supabase.co
        VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6bXlobGt3c3N5aHhrcXJqbXdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDIwMDEsImV4cCI6MjA5MTA3ODAwMX0.CAGeBDHDNMUyQYtggaqasgs4X6OgDF5PqYfX8kE_64E

    scripts:
      - name: Install frontend dependencies
        working_directory: frontend
        script: npm install

      - name: Build frontend
        working_directory: frontend
        script: |
          echo "VITE_API_URL=$VITE_API_URL" > .env
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> .env
          echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
          npm run build

      - name: Sync Capacitor Android
        working_directory: frontend
        script: |
          npm install @capacitor/cli @capacitor/android
          npx cap sync android

      - name: Build Android APK/AAB
        working_directory: frontend/android
        script: |
          chmod +x gradlew
          ./gradlew bundleRelease

    artifacts:
      - frontend/android/app/build/outputs/**/*.aab
      - frontend/android/app/build/outputs/**/*.apk

    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true

  # ─── iOS: App Store ─────────────────────────────────────────────────
  ios-release:
    name: iOS Release (App Store)
    max_build_duration: 60
    environment:
      node: 22.0.0
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.asproite.invoicepro
      vars:
        APP_STORE_CONNECT_ISSUER_ID: Encrypted(...)
        APP_STORE_CONNECT_KEY_IDENTIFIER: Encrypted(...)
        APP_STORE_CONNECT_PRIVATE_KEY: Encrypted(...)
        VITE_API_URL: https://invoicepro-production-2ed7.up.railway.app/api
        VITE_SUPABASE_URL: https://bzmyhlkwssyhxkqrjmwj.supabase.co
        VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6bXlobGt3c3N5aHhrcXJqbXdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDIwMDEsImV4cCI6MjA5MTA3ODAwMX0.CAGeBDHDNMUyQYtggaqasgs4X6OgDF5PqYfX8kE_64E

    scripts:
      - name: Install frontend dependencies
        working_directory: frontend
        script: npm install

      - name: Build frontend
        working_directory: frontend
        script: |
          echo "VITE_API_URL=$VITE_API_URL" > .env
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> .env
          echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
          npm run build

      - name: Sync Capacitor iOS
        working_directory: frontend
        script: |
          npm install @capacitor/cli @capacitor/ios
          npx cap sync ios

      - name: Install CocoaPods
        working_directory: frontend/ios/App
        script: pod install

      - name: Build IPA
        working_directory: frontend
        script: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath ios/App/App.xcarchive \
            archive

          xcodebuild -exportArchive \
            -archivePath ios/App/App.xcarchive \
            -exportPath ios/App/App.ipa \
            -exportOptionsPlist ios/App/exportOptions.plist

    artifacts:
      - frontend/ios/App/App.ipa/**/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
