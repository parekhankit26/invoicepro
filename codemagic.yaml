workflows:
  ios-build-only:
    name: InvoicePro iOS — Build Only (No Signing)
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      vars:
        BUNDLE_ID: "com.invoicepro.app"
        XCODE_PROJECT: "frontend/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: v22.13.1
      xcode: latest

    scripts:
      - name: Install Node dependencies
        script: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Build React web app
        script: |
          cd frontend
          npx tsc --noEmit || true
          npx vite build

      - name: Sync Capacitor to iOS
        script: |
          cd frontend
          npx cap sync ios

      - name: Resolve Swift Package dependencies
        script: |
          xcodebuild \
            -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -clonedSourcePackagesDirPath "$CM_BUILD_DIR/.spm"

      - name: Build iOS (unsigned)
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -derivedDataPath "$CM_BUILD_DIR/build"

    artifacts:
      - $CM_BUILD_DIR/build/Build/Products/**/*.app
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - parekhankit3@gmail.com
        notify:
          success: true
          failure: true

  ios-release:
    name: InvoicePro iOS — App Store Release (Needs Apple Account)
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: InvoicePro

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.invoicepro.app
      vars:
        BUNDLE_ID: "com.invoicepro.app"
        XCODE_PROJECT: "frontend/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: v22.13.1
      xcode: latest

    scripts:
      - name: Install Node dependencies
        script: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Build React web app
        script: |
          cd frontend
          npx tsc --noEmit || true
          npx vite build

      - name: Sync Capacitor to iOS
        script: |
          cd frontend
          npx cap sync ios

      - name: Resolve Swift Package dependencies
        script: |
          xcodebuild \
            -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -clonedSourcePackagesDirPath "$CM_BUILD_DIR/.spm"

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Increment build number
        script: |
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID") + 1))
          cd frontend/ios/App
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Build signed IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --cloned-source-packages-path "$CM_BUILD_DIR/.spm"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - parekhankit3@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
