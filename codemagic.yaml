workflows:
  ios-release:
    name: InvoicePro iOS — App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.invoicepro.app
      vars:
        BUNDLE_ID: "com.invoicepro.app"
        APP_NAME: "InvoicePro"
        XCODE_PROJECT: "frontend/ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: v18
      xcode: latest

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*"
          include: true

    scripts:
      - name: Install Node dependencies
        script: |
          cd frontend
          npm ci

      - name: Build React web app
        script: |
          cd frontend
          npm run build

      - name: Sync Capacitor to iOS
        script: |
          cd frontend
          npx cap sync ios

      - name: Resolve Swift Package Manager dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Increment build number
        script: |
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID") + 1))
          cd frontend/ios/App
          agvtool new-version -all "$BUILD_NUMBER"

      - name: Build iOS IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      email:
        recipients:
          - parekhankit3@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false   # change to true when ready for full release

  ios-debug:
    name: InvoicePro iOS — Test Build
    max_build_duration: 30
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: com.invoicepro.app
      node: v18
      xcode: latest

    scripts:
      - name: Install Node dependencies
        script: |
          cd frontend
          npm ci

      - name: Build React web app
        script: |
          cd frontend
          npm run build

      - name: Sync Capacitor to iOS
        script: |
          cd frontend
          npx cap sync ios

      - name: Resolve Swift Package dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME"
        environment:
          XCODE_PROJECT: "frontend/ios/App/App.xcodeproj"
          XCODE_SCHEME: "App"

      - name: Build (development)
        script: |
          xcode-project build-ipa \
            --project "frontend/ios/App/App.xcodeproj" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa
