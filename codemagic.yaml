workflows:

  ios-build-only:
    name: InvoicePro iOS - Build Only (No Signing)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: v22.13.1
      xcode: latest
      vars:
        BUNDLE_ID: com.asproite.invoicepro
        XCODE_PROJECT: frontend/ios/App/App.xcodeproj
        XCODE_SCHEME: App
        VITE_API_URL: https://invoicepro-production-2ed7.up.railway.app/api
        VITE_SUPABASE_URL: https://bzmyhlkwssyhxkqrjmwj.supabase.co
        VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6bXlobGt3c3N5aHhrcXJqbXdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDIwMDEsImV4cCI6MjA5MTA3ODAwMX0.CAGeBDHDNMUyQYtggaqasgs4X6OgDF5PqYfX8kE_64E
    scripts:
      - name: Install Node dependencies
        script: |
          cd frontend
          npm install --legacy-peer-deps
      - name: Build React web app
        script: |
          cd frontend
          echo "VITE_API_URL=$VITE_API_URL" > .env
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> .env
          echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
          npx tsc --noEmit || true
          npx vite build
      - name: Sync Capacitor to iOS
        script: |
          cd frontend
          npx cap sync ios
      - name: Resolve Swift Package dependencies
        script: |
          xcodebuild \
            -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -clonedSourcePackagesDirPath "$CM_BUILD_DIR/.spm"
      - name: Build iOS unsigned (iPhone + iPad)
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            TARGETED_DEVICE_FAMILY="1,2" \
            -derivedDataPath "$CM_BUILD_DIR/build"
    artifacts:
      - $CM_BUILD_DIR/build/Build/Products/**/*.app
    publishing:
      email:
        recipients:
          - parekhankit3@gmail.com
        notify:
          success: true
          failure: true

  ios-release:
    name: InvoicePro iOS - App Store Release (Needs Apple Account)
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: InvoicePro
    environment:
      node: v22.13.1
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.asproite.invoicepro
      vars:
        BUNDLE_ID: com.asproite.invoicepro
        XCODE_PROJECT: frontend/ios/App/App.xcodeproj
        XCODE_SCHEME: App
        VITE_API_URL: https://invoicepro-production-2ed7.up.railway.app/api
        VITE_SUPABASE_URL: https://bzmyhlkwssyhxkqrjmwj.supabase.co
        VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6bXlobGt3c3N5aHhrcXJqbXdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDIwMDEsImV4cCI6MjA5MTA3ODAwMX0.CAGeBDHDNMUyQYtggaqasgs4X6OgDF5PqYfX8kE_64E
    scripts:
      - name: Install Node dependencies
        script: |
          cd frontend
          npm install --legacy-peer-deps
          npm install @capacitor/ios --legacy-peer-deps
      - name: Build React web app
        script: |
          cd frontend
          echo "VITE_API_URL=$VITE_API_URL" > .env
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> .env
          echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
          npx tsc --noEmit || true
          npx vite build
      - name: Add Capacitor iOS platform
        script: |
          cd frontend
          npx cap add ios
      - name: Generate app icons and splash screens
        script: |
          cd frontend
          # Install the assets tool explicitly so it doesn't fall back to a cached version
          npm install @capacitor/assets --legacy-peer-deps
          npx @capacitor/assets generate \
            --iconBackgroundColor '#1a1814' \
            --iconBackgroundColorDark '#1a1814' \
            --splashBackgroundColor '#1a1814' \
            --splashBackgroundColorDark '#1a1814'
      - name: Enable iPad support (patch pbxproj + Info.plist)
        script: |
          PBXPROJ="frontend/ios/App/App.xcodeproj/project.pbxproj"
          PLIST="frontend/ios/App/App/Info.plist"
          # Patch TARGETED_DEVICE_FAMILY from "1" (iPhone only) to "1,2" (iPhone + iPad)
          sed -i '' 's/TARGETED_DEVICE_FAMILY = 1;/TARGETED_DEVICE_FAMILY = "1,2";/g' "$PBXPROJ"
          sed -i '' 's/TARGETED_DEVICE_FAMILY = "1";/TARGETED_DEVICE_FAMILY = "1,2";/g' "$PBXPROJ"
          # Add iPad orientations to Info.plist
          /usr/libexec/PlistBuddy -c "Delete :UISupportedInterfaceOrientations~ipad" "$PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad array" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:0 string UIInterfaceOrientationPortrait" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:1 string UIInterfaceOrientationPortraitUpsideDown" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:2 string UIInterfaceOrientationLandscapeLeft" "$PLIST"
          /usr/libexec/PlistBuddy -c "Add :UISupportedInterfaceOrientations~ipad:3 string UIInterfaceOrientationLandscapeRight" "$PLIST"
      - name: Patch native iOS to eliminate blank white screen
        script: |
          STORYBOARD="frontend/ios/App/App/Base.lproj/LaunchScreen.storyboard"
          APPDELEGATE="frontend/ios/App/App/AppDelegate.swift"
          # Replace white launch screen background with app dark colour (#1a1814)
          # The default Capacitor storyboard uses white="1" for the background colour
          sed -i '' 's/white="1" alpha="1" colorSpace="custom" customColorSpace="genericGamma22GrayColorSpace"/red="0.10196078431372549" green="0.09411764705882353" blue="0.07843137254901961" alpha="1" colorSpace="custom" customColorSpace="sRGB"/g' "$STORYBOARD"
          # Also handle any systemBackground or other white references in the storyboard
          sed -i '' 's/key="backgroundColor" white="1"/key="backgroundColor" red="0.102" green="0.094" blue="0.078" alpha="1" colorSpace="custom" customColorSpace="sRGB"/g' "$STORYBOARD"
          # Patch AppDelegate.swift: set window background colour so WebView is dark before content loads
          sed -i '' 's/return true/self.window?.backgroundColor = UIColor(red: 0.102, green: 0.094, blue: 0.078, alpha: 1.0)\n        return true/' "$APPDELEGATE"
      - name: Sync Capacitor to iOS
        script: |
          cd frontend
          npx cap sync ios
      - name: Resolve Swift Package dependencies
        script: |
          xcodebuild \
            -resolvePackageDependencies \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -clonedSourcePackagesDirPath "$CM_BUILD_DIR/.spm"
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Set build number
        script: |
          cd frontend/ios/App
          agvtool new-version -all $BUILD_NUMBER
      - name: Build signed IPA (iPhone + iPad universal)
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - parekhankit3@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false

  android-release:
    name: InvoicePro Android - Google Play (Signed AAB)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      node: v22.13.1
      java: 17
      vars:
        VITE_API_URL: https://invoicepro-production-2ed7.up.railway.app/api
        VITE_SUPABASE_URL: https://bzmyhlkwssyhxkqrjmwj.supabase.co
        VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6bXlobGt3c3N5aHhrcXJqbXdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MDIwMDEsImV4cCI6MjA5MTA3ODAwMX0.CAGeBDHDNMUyQYtggaqasgs4X6OgDF5PqYfX8kE_64E
        CM_KEYSTORE_PASSWORD: InvoicePro@2024
        CM_KEY_ALIAS: invoicepro
        CM_KEY_PASSWORD: InvoicePro@2024
      # Base64-encoded keystore stored as a Codemagic secret variable
      # Add CM_KEYSTORE (base64) in Codemagic UI → Environment variables
    scripts:
      - name: Install Node dependencies
        script: |
          cd frontend
          npm install --legacy-peer-deps
      - name: Build React web app
        script: |
          cd frontend
          echo "VITE_API_URL=$VITE_API_URL" > .env
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> .env
          echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
          npx tsc --noEmit || true
          npx vite build
      - name: Generate Android icons and splash
        script: |
          cd frontend
          npm install @capacitor/assets --legacy-peer-deps
          npx @capacitor/assets generate \
            --iconBackgroundColor '#1a1814' \
            --iconBackgroundColorDark '#1a1814' \
            --splashBackgroundColor '#1a1814' \
            --splashBackgroundColorDark '#1a1814' || true
      - name: Sync Capacitor to Android
        script: |
          cd frontend
          npx cap sync android
      - name: Set up Android keystore
        script: |
          echo $CM_KEYSTORE | base64 --decode > /tmp/invoicepro-release-key.jks
      - name: Build signed Android App Bundle (AAB)
        script: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=/tmp/invoicepro-release-key.jks \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
    artifacts:
      - frontend/android/app/build/outputs/bundle/release/app-release.aab
      - frontend/android/app/build/outputs/apk/release/app-release.apk
    publishing:
      email:
        recipients:
          - parekhankit3@gmail.com
        notify:
          success: true
          failure: true
